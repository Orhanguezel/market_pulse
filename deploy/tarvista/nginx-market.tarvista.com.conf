# market.tarvista.com — market_pulse MERKEZİ çok-tenant SaaS (Faz 7)
# /etc/nginx/sites-available/market.tarvista.com  → sites-enabled symlink
# SSL satırlarını certbot enjekte eder. www → apex 301.
#
# Topoloji (admin panel root'ta, frontend KAPALI):
#   /         -> admin panel (Next, 3097)  [/ -> /auth/login]
#   /api/     -> backend (8087)            [tenant: ?tenantKey= veya X-Tenant header]
#   /uploads/ -> backend (8087)
#   /tr       -> /  (eski public URL alışkanlığı)
server {
  server_name market.tarvista.com;
  client_max_body_size 50M;

  location = /tr  { return 301 /; }
  location = /tr/ { return 301 /; }

  location /api/ {
    proxy_pass http://127.0.0.1:8087;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }
  location /uploads/ {
    proxy_pass http://127.0.0.1:8087;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  location / {
    proxy_pass http://127.0.0.1:3097;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 120s;
  }

  listen 443 ssl;       # certbot
  ssl_certificate /etc/letsencrypt/live/market.tarvista.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/market.tarvista.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  access_log /var/log/nginx/market.tarvista.com.access.log;
  error_log  /var/log/nginx/market.tarvista.com.error.log;
}
# www -> apex (cert market.tarvista.com + www.market.tarvista.com kapsar)
server {
  listen 443 ssl;
  server_name www.market.tarvista.com;
  ssl_certificate /etc/letsencrypt/live/market.tarvista.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/market.tarvista.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  return 301 https://market.tarvista.com$request_uri;
}
server {
  listen 80;
  server_name market.tarvista.com www.market.tarvista.com;
  return 301 https://market.tarvista.com$request_uri;
}
