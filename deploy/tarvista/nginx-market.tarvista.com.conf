# market.tarvista.com — market_pulse (tarvista tenant)
# /etc/nginx/sites-available/market.tarvista.com  → sites-enabled symlink
# SSL satırlarını `certbot --nginx -d market.tarvista.com` enjekte eder.
#
# Topoloji:
#   /         -> frontend (Next, 3077)  — /api/v1 ve /uploads'ı kendi rewrite'ıyla backend'e proxy'ler
#   /panel/   -> admin panel (Next, 3097, basePath=/panel)
#   /uploads/ -> backend (8087)  — doğrudan medya
server {
  listen 80;
  listen [::]:80;
  server_name market.tarvista.com;

  client_max_body_size 50M;

  # Admin panel (basePath=/panel)
  location /panel/ {
    proxy_pass http://127.0.0.1:3097;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 120s;
  }

  # Backend medya (opsiyonel doğrudan erişim)
  location /uploads/ {
    proxy_pass http://127.0.0.1:8087;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Frontend (public) — /api/v1 proxy'sini Next rewrite halleder
  location / {
    proxy_pass http://127.0.0.1:3077;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 120s;
  }

  access_log /var/log/nginx/market.tarvista.com.access.log;
  error_log  /var/log/nginx/market.tarvista.com.error.log;
}
